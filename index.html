<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math of Stars Market Dashboard</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f4ee;color:#182025}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh}button,input{font:inherit}button{border:0;cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:minmax(260px,320px) 1fr}.sidebar{background:#fbf6ea;color:#1f2c2d;border-right:1px solid #dfd8ca;padding:24px;display:flex;flex-direction:column;gap:20px}.kicker{color:#69726f;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}.sidebar h1{margin:4px 0 0;font-size:1.55rem;line-height:1.15}.label{color:#69726f;font-size:.82rem}.segmented{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;border:1px solid #dfd8ca;border-radius:8px;background:#fffdf7}.segment{min-height:36px;border-radius:6px;background:transparent;color:#40504f}.segment.active{background:#2f7672;color:#fff}.note{color:#69726f;font-size:.86rem;line-height:1.5}.block{display:grid;gap:10px}.search{width:100%;height:42px;border-radius:6px;border:1px solid #dfd8ca;padding:0 12px;background:#fffdf7;color:#182025}.symbols{display:grid;gap:6px;max-height:36vh;overflow:auto;padding-right:2px}.symbol{min-height:42px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;color:#1f2c2d;background:#fffdf7;border:1px solid #e6dccb;text-align:left}.symbol.active{background:#e5f0ed;border-color:#76aaa4}.symbol strong,.symbol span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.symbol span{color:#69726f;font-size:.78rem}.follow{width:32px;height:32px;display:grid;place-items:center;border-radius:6px;background:#f5e6bd;color:#7a6020}.follow.disabled{opacity:.35}.main{min-width:0;display:grid;grid-template-rows:auto 1fr auto}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid #dfd8ca;background:#fffaf0}.top h2{margin:0;font-size:1.2rem}.pill{display:inline-flex;align-items:center;min-height:32px;border-radius:999px;padding:0 12px;background:#dce6e5;color:#182025;font-size:.86rem}.workspace{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(300px,.75fr);gap:22px;padding:24px}.chartbox{min-height:420px;border:1px solid #dfd8ca;border-radius:8px;background:#fffdf7;padding:14px}.chart{display:block;width:100%;height:min(54vh,520px);min-height:360px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:10px}.metric,.panel{border:1px solid #dfd8ca;border-radius:8px;background:#fffdf7;padding:12px}.metric span{display:block;color:#69726f;font-size:.78rem}.metric strong{display:block;margin-top:6px;font-size:clamp(1rem,1.8vw,1.35rem);line-height:1.1}.side{display:grid;gap:16px}.panel{padding:16px}.panel h3{margin:0 0 8px;font-size:1rem}.panel p,.panel pre{margin:0;color:#333c40;line-height:1.6}.panel pre{white-space:pre-wrap;word-break:break-word;font-family:"PingFang TC","Microsoft JhengHei",ui-sans-serif,system-ui,sans-serif;font-size:.95rem}.toggle{display:inline-flex;align-items:center;gap:8px;margin:6px 0 10px;color:#333c40}.foot{padding:16px 24px;color:#69726f;font-size:.86rem;border-top:1px solid #dfd8ca}@media(max-width:980px){.app{grid-template-columns:1fr}.workspace{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.top,.workspace,.sidebar,.foot{padding-left:16px;padding-right:16px}.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const entitlements={visitor:{label:"Visitor",max:0,full:false,email:false,details:false},free:{label:"Free member",max:3,full:false,email:true,details:false},paid:{label:"Paid member",max:20,full:true,email:true,details:true}};
    const symbols=[
      ["^HSI","Hang Seng Index","HK","index",true,26080],["^HSCE","Hang Seng China Enterprises","HK","index",true,9480],["^GSPC","S&P 500","US","index",true,6845],["^IXIC","Nasdaq Composite","US","index",true,22860],["^NDX","Nasdaq 100","US","index",true,25140],["0700.HK","Tencent","HK","hk-stock",true,628],["9988.HK","Alibaba HK","HK","hk-stock",true,158],["3690.HK","Meituan","HK","hk-stock",false,116],["0005.HK","HSBC","HK","hk-stock",false,104],["1299.HK","AIA","HK","hk-stock",false,72],["AAPL","Apple","US","us-stock",true,286],["MSFT","Microsoft","US","us-stock",false,512],["NVDA","Nvidia","US","us-stock",true,188],["AMZN","Amazon","US","us-stock",false,234],["META","Meta Platforms","US","us-stock",false,642],["TSLA","Tesla","US","us-stock",false,418],["BTC-USD","Bitcoin","CRYPTO","crypto",true,116500],["ETH-USD","Ethereum","CRYPTO","crypto",true,4260],["GC=F","Gold Futures","GLOBAL","commodity",true,3920],["CL=F","WTI Crude Oil","GLOBAL","commodity",true,78],["GBPHKD=X","GBP/HKD","FX","fx",false,10.32],["AUDHKD=X","AUD/HKD","FX","fx",false,5.08],["CADHKD=X","CAD/HKD","FX","fx",false,5.72]
    ];
    const statusCycle=["強勢","改善中","中性","轉弱","弱勢"];
    const snapshots=symbols.map((s,i)=>{const [symbol,name,region,assetClass,publicDemo,base]=s;const seed=[...symbol].reduce((a,c)=>a+c.charCodeAt(0),0);const prices=Array.from({length:90},(_,idx)=>{const d=new Date("2026-05-19T00:00:00Z");d.setUTCDate(d.getUTCDate()-(89-idx));const close=base*(1+Math.sin((idx+seed)/8)*.05+(idx-45)*.0012+Math.cos((idx+seed)/3)*.015);return{date:d.toISOString().slice(0,10),close:+close.toFixed(base>100?2:4)}});const price=prices.at(-1).close;const month=+(price*(.95+(i%5)*.015)).toFixed(base>100?2:4);const pr=42+(i*7)%51;const sma=48+(i*5)%36;return{symbol,name,region,assetClass,publicDemo,prices,indicator:{price,pr,sma,diff:pr-sma,week:+(price*.985).toFixed(base>100?2:4),month,quarter:+(price*.93).toFixed(base>100?2:4),year:+(price*.86).toFixed(base>100?2:4),distance:+(((price-month)/month)*100).toFixed(2),status:statusCycle[i%5],signal:pr>sma?"動能改善":"等待確認",asOf:"2026-05-19"},coach:(statusCycle[i%5]==="強勢"||statusCycle[i%5]==="改善中")?"圖表節奏偏向改善，重點是價格能否守在月分界上方，並讓 PR 值維持高於 SMA1。":"圖表仍需要確認，重點不是單日反彈，而是能否重新站回關鍵分界並延續。"}});
    const state={tier:"visitor",selected:"^HSI",followed:[],query:"",includeDetails:true};
    const app=document.querySelector("#app");
    const fmt=v=>new Intl.NumberFormat("en-US",{maximumFractionDigits:Math.abs(v)<20?4:2}).format(v);
    const tierNote=t=>t==="visitor"?"訪客可查看精選市場示範圖表；登入 Patreon 後可建立個人追蹤清單。":t==="free"?"免費會員可追蹤最多 3 個 symbol，週報只提供整體 digest，不含逐一 symbol 詳解。":"付費會員可追蹤最多 20 個 symbol，並可選擇在週報加入個別 symbol 解讀。";
    const visible=()=>snapshots.filter(x=>entitlements[state.tier].full||x.publicDemo).filter(x=>(x.symbol+" "+x.name).toLowerCase().includes(state.query.trim().toLowerCase()));
    const selected=()=>snapshots.find(x=>x.symbol===state.selected)||snapshots[0];
    const emailItems=()=>state.tier==="visitor"?[]:(state.followed.length?state.followed:["^HSI","^GSPC","BTC-USD"]).map(s=>snapshots.find(x=>x.symbol===s)).filter(Boolean);
    function digest(){if(state.tier==="visitor")return"訪客不會收到 email digest。登入 Patreon 免費會員後，可建立 3 個 symbol 的追蹤清單並收到每週總覽。";const items=emailItems(),im=items.filter(x=>x.indicator.diff>0),am=items.filter(x=>x.indicator.distance>=0),strong=[...items].sort((a,b)=>b.indicator.pr-a.indicator.pr)[0],weak=[...items].sort((a,b)=>a.indicator.pr-b.indicator.pr)[0];let lines=["一句話總結",`本週追蹤清單中，${im.length} 個 symbol 的 PR 值高於 SMA1，${am.length} 個仍站在月分界上方，整體屬於需要分層觀察的狀態。`,"","本週焦點",strong?`${strong.name} 暫時是清單內相對較強的項目，重點是動能能否維持而不是單日價格表現。`:"暫未有足夠資料判斷相對強弱。",weak?`${weak.name} 的 PR 值相對落後，若價格仍低於月分界，應先視為修復不足。`:"","","先教你看圖","PR 值可視為動能溫度計，SMA1 則幫助判斷動能是否正在改善。價格站在月分界上方時，代表節奏較容易由弱轉穩；若跌回分界下方，原本的改善訊號需要下調可信度。","","風險提示","這是圖表閱讀、教育及研究用途，不構成投資建議。"].filter(Boolean);if(state.tier==="paid"&&state.includeDetails){lines.splice(lines.length-2,0,"","個別 symbol 摘要",...items.slice(0,5).map((x,i)=>`${["第一","第二","第三","第四","第五"][i]}，${x.name}：${x.coach}`));}return lines.join("\n");}
    function draw(canvas,s){const c=canvas.getContext("2d"),r=devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=Math.floor(rect.width*r);canvas.height=Math.floor(rect.height*r);c.scale(r,r);const w=rect.width,h=rect.height,p={t:24,r:58,b:34,l:16},pw=w-p.l-p.r,ph=h-p.t-p.b,vals=[...s.prices.map(x=>x.close),s.indicator.week,s.indicator.month,s.indicator.quarter,s.indicator.year],min=Math.min(...vals)*.985,max=Math.max(...vals)*1.015,x=i=>p.l+i/Math.max(s.prices.length-1,1)*pw,y=v=>p.t+(max-v)/Math.max(max-min,1)*ph;c.fillStyle="#fffdf7";c.fillRect(0,0,w,h);c.strokeStyle="#e4ddcf";for(let i=0;i<=4;i++){let gy=p.t+ph/4*i;c.beginPath();c.moveTo(p.l,gy);c.lineTo(w-p.r,gy);c.stroke()}c.strokeStyle="#245c58";c.lineWidth=2;c.beginPath();s.prices.forEach((pt,i)=>i?c.lineTo(x(i),y(pt.close)):c.moveTo(x(i),y(pt.close)));c.stroke();[["週",s.indicator.week,"#8a7a35"],["月",s.indicator.month,"#b64f36"],["季",s.indicator.quarter,"#4f6fb6"],["年",s.indicator.year,"#655d74"]].forEach(([lab,val,col])=>{let ly=y(val);c.strokeStyle=col;c.setLineDash([6,5]);c.beginPath();c.moveTo(p.l,ly);c.lineTo(w-p.r,ly);c.stroke();c.setLineDash([]);c.fillStyle=col;c.font="12px system-ui";c.fillText(`${lab} ${fmt(val)}`,w-p.r+8,ly+4)});const last=s.prices.at(-1);c.fillStyle="#245c58";c.beginPath();c.arc(x(s.prices.length-1),y(last.close),4,0,Math.PI*2);c.fill();c.fillStyle="#69726f";c.font="12px system-ui";c.fillText(s.prices[0].date,p.l,h-12);c.textAlign="right";c.fillText(s.indicator.asOf,w-p.r,h-12);c.textAlign="left";}
    function render(){const e=entitlements[state.tier],s=selected();app.innerHTML=`<div class="app"><aside class="sidebar"><div><span class="kicker">Math of Stars</span><h1>Market Dashboard</h1></div><section class="block"><span class="label">Access mode</span><div class="segmented">${Object.keys(entitlements).map(t=>`<button class="segment ${state.tier===t?"active":""}" data-tier="${t}">${entitlements[t].label}</button>`).join("")}</div><p class="note">${tierNote(state.tier)}</p></section><section class="block"><span class="label">${e.full?"Search supported symbols":"Search public demo symbols"}</span><input class="search" value="${state.query}" placeholder="Symbol or name" data-search></section><section class="block"><span class="label">Symbols</span><div class="symbols">${visible().map(x=>{const f=state.followed.includes(x.symbol),disabled=state.tier==="visitor"||(!f&&state.followed.length>=e.max);return`<button class="symbol ${state.selected===x.symbol?"active":""}" data-symbol="${x.symbol}"><span><strong>${x.symbol}</strong><span>${x.name}</span></span><span class="follow ${disabled?"disabled":""}" data-follow="${x.symbol}" data-disabled="${disabled}">${f?"−":"+"}</span></button>`}).join("")}</div><p class="note">Followed: ${state.followed.length}/${e.max}</p></section></aside><main class="main"><header class="top"><div><h2>${s.name}</h2><span>${s.symbol} · ${s.region} · ${s.assetClass}</span></div><span class="pill">${s.indicator.status} · ${s.indicator.signal}</span></header><div class="workspace"><section><div class="chartbox"><canvas class="chart" data-chart></canvas></div><div class="grid"><div class="metric"><span>現價</span><strong>${fmt(s.indicator.price)}</strong></div><div class="metric"><span>PR 值</span><strong>${s.indicator.pr}</strong></div><div class="metric"><span>SMA1</span><strong>${s.indicator.sma}</strong></div><div class="metric"><span>月線距離</span><strong>${s.indicator.distance}%</strong></div></div><div class="grid"><div class="metric"><span>週分界</span><strong>${fmt(s.indicator.week)}</strong></div><div class="metric"><span>月分界</span><strong>${fmt(s.indicator.month)}</strong></div><div class="metric"><span>季分界</span><strong>${fmt(s.indicator.quarter)}</strong></div><div class="metric"><span>年分界</span><strong>${fmt(s.indicator.year)}</strong></div></div></section><section class="side"><article class="panel"><h3>Chart-reading coach</h3><p>${s.coach}</p></article><article class="panel"><h3>News summary</h3><p>Stage 1 使用示範新聞摘要；正式版本會接入新聞來源並按 symbol 生成週度重點。</p></article><article class="panel"><h3>Fundamental update</h3><p>Stage 1 使用示範基本面欄位；正式版本會加入市值、估值、盈利及增長資料。</p></article><article class="panel"><h3>Weekly email preview</h3>${state.tier==="paid"?`<label class="toggle"><input type="checkbox" data-details ${state.includeDetails?"checked":""}> Include followed symbol details</label>`:""}<pre>${digest()}</pre></article></section></div><footer class="foot">圖表閱讀、教育及研究用途，不構成投資建議。Stage 1 currently uses mock snapshots until Supabase and market-data jobs are connected.</footer></main></div>`;document.querySelectorAll("[data-tier]").forEach(b=>b.onclick=()=>{state.tier=b.dataset.tier;state.followed=state.tier==="visitor"?[]:["^HSI","^GSPC","BTC-USD"].slice(0,e.max);if(!visible().some(x=>x.symbol===state.selected))state.selected=visible()[0]?.symbol||"^HSI";render()});document.querySelector("[data-search]").oninput=ev=>{state.query=ev.target.value;render()};document.querySelectorAll("[data-symbol]").forEach(b=>b.onclick=ev=>{const f=ev.target.closest("[data-follow]");if(f){ev.stopPropagation();if(f.dataset.disabled==="true")return;const sym=f.dataset.follow;state.followed=state.followed.includes(sym)?state.followed.filter(x=>x!==sym):[...state.followed,sym];render();return}state.selected=b.dataset.symbol;render()});document.querySelector("[data-details]")?.addEventListener("change",ev=>{state.includeDetails=ev.target.checked;render()});draw(document.querySelector("[data-chart]"),s)}
    render();addEventListener("resize",()=>draw(document.querySelector("[data-chart]"),selected()));
  </script>
</body>
</html>
