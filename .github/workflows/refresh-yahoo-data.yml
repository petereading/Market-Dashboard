name: Refresh Yahoo Data

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols, or empty for all Stage 1 symbols"
        required: false
        default: ""
      sleep:
        description: "Seconds to sleep between Yahoo requests"
        required: false
        default: "0.25"
      report_tier:
        description: "Weekly report tier: free or paid"
        required: false
        default: "free"
      include_symbol_details:
        description: "Set to true to include individual symbol summaries in the report"
        required: false
        default: "false"
      report_symbols:
        description: "Comma-separated report symbols, or empty for all fetched symbols"
        required: false
        default: ""
  schedule:
    # 07:30 HKT Tuesday-Saturday, after the US close has settled.
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DASHBOARD_SYMBOLS: ${{ github.event.inputs.symbols || '' }}
      DASHBOARD_SLEEP: ${{ github.event.inputs.sleep || '0.25' }}
      REPORT_TIER: ${{ github.event.inputs.report_tier || 'free' }}
      INCLUDE_SYMBOL_DETAILS: ${{ github.event.inputs.include_symbol_details || 'false' }}
      REPORT_SYMBOLS: ${{ github.event.inputs.report_symbols || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh dashboard artifacts
        run: |
          args=(--sleep "$DASHBOARD_SLEEP" --tier "$REPORT_TIER")
          if [ -n "$DASHBOARD_SYMBOLS" ]; then
            args+=(--symbols "$DASHBOARD_SYMBOLS")
          fi
          if [ "$INCLUDE_SYMBOL_DETAILS" = "true" ]; then
            args+=(--include-symbol-details)
          fi
          if [ -n "$REPORT_SYMBOLS" ]; then
            args+=(--report-symbols "$REPORT_SYMBOLS")
          fi
          node scripts/refresh_market_artifacts.mjs "${args[@]}"

      - name: Commit refreshed artifact
        run: |
          if [ -z "$(git status --porcelain -- public/data/latest.json public/reports)" ]; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json public/reports
          git commit -m "Refresh dashboard artifacts"
          git pull --rebase origin main
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "git push failed on attempt ${attempt}; retrying in 15 seconds..."
            sleep 15
          done
          echo "git push failed after 5 attempts."
          exit 1
